# Optimized OSM confusion matrix (derived from GT co-occurrence analysis).
# Rows  = common taxonomy semantic classes (1-8).
# Cols  = OSM prior categories: [roads, sidewalks, cycleways, parking, grasslands, trees, forest, buildings, fences]
# Values in [0.0, 1.0]: each column is a probability distribution that sums to 1.
