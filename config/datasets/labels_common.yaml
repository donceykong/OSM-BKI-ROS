# Common taxonomy: 13 classes shared across all datasets.
# All raw dataset labels (SemanticKITTI, MCD, etc.) are mapped to these
# contiguous indices at ingestion time so that num_class = 13.

name: "common"
num_class: 13

labels:
  0: "unlabeled"
  1: "road"
  2: "sidewalk"
  3: "parking"
  4: "other-ground"
  5: "building"
  6: "fence"
  7: "pole"
  8: "traffic-sign"
  9: "vegetation"
  10: "two-wheeler"
  11: "vehicle"
  12: "other-object"

# RGB colors for visualization (one per common class)
color_map:
  0:  [0, 0, 0]          # unlabeled
  1:  [128, 64, 128]     # road
  2:  [232, 35, 244]     # sidewalk
  3:  [160, 170, 250]    # parking
  4:  [75, 0, 175]       # other-ground
  5:  [255, 200, 0]      # building
  6:  [255, 120, 50]     # fence
  7:  [255, 240, 150]    # pole
  8:  [255, 0, 0]        # traffic-sign
  9:  [0, 175, 0]        # vegetation
  10: [245, 230, 100]    # two-wheeler
  11: [100, 150, 245]    # vehicle
  12: [50, 255, 255]     # other-object

# ---- Per-dataset mappings: raw label ID → common class index ---------------

