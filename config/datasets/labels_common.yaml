# Common taxonomy: 9 classes shared across all datasets.
# All raw dataset labels (SemanticKITTI, MCD, etc.) are mapped to these
# contiguous indices at ingestion time so that num_class = 9.

name: "common"
num_class: 9

labels:
  0: "unlabeled"
  1: "road"
  2: "sidewalk"
  3: "parking"
  4: "building"
  5: "fence"
  6: "vegetation"
  7: "vehicle"
  8: "terrain"

# RGB colors for visualization (one per common class)
color_map:
  0:  [0, 0, 0]          # unlabeled
  1:  [128, 64, 128]     # road
  2:  [232, 35, 244]     # sidewalk
  3:  [160, 170, 250]    # parking
  4:  [255, 200, 0]      # building
  5:  [255, 120, 50]     # fence
  6:  [0, 175, 0]        # vegetation
  7:  [100, 150, 245]    # vehicle
  8:  [144, 238, 144]    # terrain

# ---- Per-dataset mappings: raw label ID → common class index ---------------

