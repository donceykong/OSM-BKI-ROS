# Common taxonomy: 11 classes shared across all datasets.
# All raw dataset labels (SemanticKITTI, MCD, etc.) are mapped to these
# contiguous indices at ingestion time so that num_class = 11.

name: "common"
num_class: 11

labels:
  0: "unlabeled"
  1: "road"
  2: "sidewalk"
  3: "parking"
  4: "building"
  5: "fence"
  6: "pole"
  7: "traffic-sign"
  8: "vegetation"
  9: "vehicle"
  10: "terrain"

# RGB colors for visualization (one per common class)
color_map:
  0:  [0, 0, 0]          # unlabeled
  1:  [128, 64, 128]     # road
  2:  [232, 35, 244]     # sidewalk
  3:  [160, 170, 250]    # parking
  4:  [255, 200, 0]      # building
  5:  [255, 120, 50]     # fence
  6:  [255, 240, 150]    # pole
  7:  [255, 0, 0]        # traffic-sign
  8:  [0, 175, 0]        # vegetation
  9:  [100, 150, 245]    # vehicle
  10: [144, 238, 144]    # terrain

