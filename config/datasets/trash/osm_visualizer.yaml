# OSM Visualizer standalone config
# Use with: ros2 launch semantic_bki osm_visualizer_launch.py

/**:
  ros__parameters:
    osm_file: kth_large.osm  # Path (relative to data/mcd/ or absolute)
    osm_origin_lat: 59.347671416
    osm_origin_lon: 18.072069652
    publish_rate: 1.0
    topic: /osm_geometries

    # Tree points (natural=tree nodes): drawn as 2D circles with this radius (meters). Same value used for prior projection.
    tree_point_radius_meters: 6.0
    # Stairs (highway=steps): each polyline segment drawn as rectangle with this width (meters) perpendicular to segment.
    stairs_width_meters: 10.0

    # Optional: Transform OSM data to first pose origin (so both start at 0,0,0).
    # Use sequence_name + lidar_pose_suffix (path = sequence_name/lidar_pose_suffix under data_dir).
    sequence_name: kth_day_09
    lidar_pose_suffix: pose_inW.csv
    data_dir: ""  # Data directory (if empty, will try package share/data/mcd/)