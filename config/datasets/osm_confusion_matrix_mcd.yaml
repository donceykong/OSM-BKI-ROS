# Common taxonomy:
#   1: road, 2: sidewalk, 3: parking, 4: other-ground, 5: building,
#   6: fence, 7: pole, 8: traffic-sign, 9: vegetation, 10: two-wheeler,
#   11: vehicle, 12: other-object

