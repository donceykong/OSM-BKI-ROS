# Optimized OSM confusion matrix (derived from GT co-occurrence analysis).
# Rows  = common taxonomy semantic classes (1-12).
# Cols  = OSM prior categories: [roads, sidewalks, cycleways, parking, grasslands, trees, forest, buildings, fences, walls, stairs, water, poles, none]
# Values in [0.0, 1.0]: boost only (no suppression).
