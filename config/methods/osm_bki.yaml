# SemanticBKIOctoMap config

/**:
  ros__parameters:
    # Octree parameter
    block_depth: 1 # Test-data octree depth (see Wang & Englot ICRA 2016)

    # Kernel parameters
    sf2: 10.0 # Actually sigma_0 in sparse kernel
    ell: 1.0  # Length scale of the sparse kernel (using 3 * resolution)

    # BGK Inference class prior pseudocounts
    prior: 0.001 # each class

    # Threshold on variance to distinguish known/unknown
    var_thresh: 0.09

    # Free/Occupied Thresholds
    free_thresh: 0.4
    occupied_thresh: 0.6

    # Default OSM geometry parameters (used by optimize_osm_cm_*.py scripts).
    # Dataset-specific confusion matrix yamls or CLI args can override these.
    osm_geometry_parameters:
      osm_decay_meters: 0.000
      road_width_meters: 100.0   # fallback for unmapped highway types (OSM2World "else" default)
      sidewalk_width_meters: 2.0
      cycleway_width_meters: 2.0
      fence_width_meters: 0.6
      tree_point_radius_meters: 5.0