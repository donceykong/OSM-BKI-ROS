services:
  osm-bki:
    build: .
    container_name: osm-bki
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
    volumes:
      # Mount dataset directory (host hercules-collect3 → container hercules-collect1 paths)
      - /media/sgarimella34/hercules-collect3/datasets:/media/sgarimella34/hercules-collect1/datasets
      # DEM and DSM tile directories
      - /media/sgarimella34/hercules-collect3/kitti360_DGM025:/media/sgarimella34/hercules-collect1/kitti360_DGM025
      - /media/sgarimella34/hercules-collect3/kitti360_DOM1:/media/sgarimella34/hercules-collect1/kitti360_DOM1
      # KTH geospatial data (Stockholm DEM/DSM source) and output
      - /media/sgarimella34/hercules-collect3/kth_geopatial_data:/media/sgarimella34/hercules-collect1/kth_geopatial_data
      - /media/sgarimella34/hercules-collect3/kth_dem_dsm:/media/sgarimella34/hercules-collect1/kth_dem_dsm
      # X11 forwarding for RViz
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
    stdin_open: true
    tty: true
