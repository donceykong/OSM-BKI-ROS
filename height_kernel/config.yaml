# Height kernel configuration

# λ: strength of height prior (0 = disabled, 1 = full gating)
lambda: 0.5

# DEM/DSM paths
dem_path: /media/sgarimella34/hercules-collect1/kitti360_DGM025/merged_dem.tif
dsm_path: /media/sgarimella34/hercules-collect1/kitti360_DOM1/merged_dsm.tif

# Transform file (generated by align_trajectory.py)
transform_file: /media/sgarimella34/hercules-collect1/datasets/kitti360/2013_05_28_drive_0000_sync/kitti360_to_utm.npz

# Per-class height priors (commonly used taxonomy)
height_priors:
  - { class_index: 0,  name: unlabeled,  mu: 0.0,  tau: 100.0 }
  - { class_index: 1,  name: car,        mu: 0.8,  tau: 1.0 }
  - { class_index: 2,  name: bicycle,    mu: 0.5,  tau: 1.0 }
  - { class_index: 3,  name: motorcycle,  mu: 0.5,  tau: 1.0 }
  - { class_index: 4,  name: truck,      mu: 1.5,  tau: 2.0 }
  - { class_index: 5,  name: person,     mu: 0.9,  tau: 1.0 }
  - { class_index: 6,  name: road,       mu: 0.0,  tau: 0.5 }
  - { class_index: 7,  name: sidewalk,   mu: 0.0,  tau: 0.5 }
  - { class_index: 8,  name: building,   mu: 8.0,  tau: 15.0 }
  - { class_index: 9,  name: vegetation, mu: 3.0,  tau: 8.0 }
  - { class_index: 10, name: terrain,    mu: 0.0,  tau: 1.0 }
  - { class_index: 11, name: fence,      mu: 1.0,  tau: 1.5 }
  - { class_index: 12, name: pole,       mu: 3.0,  tau: 4.0 }

# RViz visualization
dem_topic: /dem_surface
dsm_topic: /dsm_surface
dem_resolution: 2.0    # meters between published DEM points (subsample for performance)
dsm_resolution: 2.0
vis_radius: 150.0      # meters around trajectory to publish
